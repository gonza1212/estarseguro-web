name: Deploy to Hostinger

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          PUBLIC_WHATSAPP_NUMBER: ${{ secrets.PUBLIC_WHATSAPP_NUMBER }}
          PUBLIC_INSTAGRAM_URL: ${{ secrets.PUBLIC_INSTAGRAM_URL }}
          PUBLIC_SAN_CRISTOBAL_URL: ${{ secrets.PUBLIC_SAN_CRISTOBAL_URL }}
          PUBLIC_LINKEDIN_GASTON_URL: ${{ secrets.PUBLIC_LINKEDIN_GASTON_URL }}
          PUBLIC_LINKEDIN_MELISA_URL: ${{ secrets.PUBLIC_LINKEDIN_MELISA_URL }}

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
